<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Resource Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">DevLearn</div>
        <ul class="nav-links">
            <li><a href="#media">Resources</a></li>
            <li><a href="#feedback">Join the Club</a></li>
        </ul>
    </nav>

    <main>
        <section id="media">
            <h2>Featured Tutorial</h2>
            <div class="video-container">
                <video controls poster="https://via.placeholder.com/800x450">
                    <source src="sample-video.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
            <p>Listen to the lecture summary:</p>
            <audio controls>
                <source src="audio-summary.mp3" type="audio/mpeg">
            </audio>
        </section>

        <hr>

        <section id="feedback">
            <h2>Get Updates & Give Feedback</h2>
            <form action="#">
                <div class="form-group">
                    <label for="name">Full Name:</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" placeholder="dev@example.com" required>
                </div>

                <div class="form-group">
                    <p>Experience Level:</p>
                    <input type="radio" id="beginner" name="level" value="beginner" checked>
                    <label for="beginner">Beginner</label>
                    <input type="radio" id="pro" name="level" value="pro">
                    <label for="pro">Pro</label>
                </div>

                <button type="submit" class="btn-submit">Subscribe Now</button>
            </form>
        </section>
    </main>

</body>
</html>
